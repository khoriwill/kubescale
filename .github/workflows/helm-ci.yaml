name: KubeScale Helm CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  helm-lint-validate:
    name: Lint and Validate Helm Chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Helm lint
        run: helm lint .

      - name: Helm template validation
        run: helm template kubescale . --debug

      - name: Confirm chart version
        run: helm show chart .
